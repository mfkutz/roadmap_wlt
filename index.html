<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldLider · Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07090f;
  --surface: #0d1117;
  --s3:      #161b26;
  --border:  rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text:    #dde2ed;
  --muted:   #4a5168;
  --dim:     #1e2330;

  --done-c:  #22c55e;
  --prog-c:  #3b82f6;
  --todo-c:  #3a4256;

  --amber:        #f59e0b;
  --amber-bg:     rgba(245,158,11,0.07);
  --amber-border: rgba(245,158,11,0.22);

  --p1: #f97316;
  --p2: #a855f7;
  --p3: #06b6d4;
  --p4: #3b82f6;
  --p5: #f43f5e;
  --p6: #f59e0b;
  --p7: #22c55e;

  --rail: 36px; /* distance from timeline left edge to rail center */
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  padding: 32px 48px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 32px;
  flex-wrap: wrap;
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,9,15,0.93);
  backdrop-filter: blur(20px);
}

.brand { display: flex; flex-direction: column; gap: 5px; }

.wordmark {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 19px; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 9px;
}

.wdot {
  width: 8px; height: 8px; border-radius: 50%;
  background: linear-gradient(135deg, #3b82f6, #a855f7);
  flex-shrink: 0;
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: var(--muted);
}

.header-right {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 10px;
}

.updated {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--muted);
}

.progress-block { min-width: 220px; display: flex; flex-direction: column; gap: 7px; }

.progress-row { display: flex; justify-content: space-between; align-items: center; }

.prog-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
}

.prog-pct {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600; color: #fff;
}

.bar-track { height: 2px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, #3b82f6, #a855f7, #22c55e);
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

.stats-row { display: flex; gap: 14px; }
.stat {
  display: flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--muted);
}
.sdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ── TIMELINE ── */
.timeline {
  max-width: 760px;
  margin: 0 auto;
  padding: 48px 48px 80px 80px; /* left:80px = rail(36) + content gap(44) */
  position: relative;
}

/* vertical rail */
.timeline::before {
  content: '';
  position: absolute;
  left: var(--rail);
  top: 48px; bottom: 80px;
  width: 1px;
  background: linear-gradient(
    180deg,
    transparent 0%,
    var(--border2) 4%,
    var(--border2) 96%,
    transparent 100%
  );
}

/* ── PHASE ── */
.phase {
  position: relative;
  margin-bottom: 44px;
}

/* dot on the rail — positioned relative to .phase left edge = timeline padding-left = 80px */
.phase-dot {
  position: absolute;
  /* center on rail: rail(36) - phase-left-offset(80) = -44px, then shift by half dot width */
  left: -44px;
  top: 1px;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 500; letter-spacing: 0.5px;
  background: var(--bg);
  z-index: 2;
  transform: translateX(-50%);
}

.phase-header {
  display: flex; flex-direction: column; gap: 2px;
  margin-bottom: 14px;
  padding-left: 0;
}

.phase-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; font-weight: 700;
}

.phase-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--muted);
}

/* tasks list */
.tasks { display: flex; flex-direction: column; gap: 6px; }

/* ── TASK ── */
.task {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 11px 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.task.is-done { opacity: 0.5; }
.task.is-done .task-title {
  text-decoration: line-through;
  text-decoration-color: var(--muted);
}

.task-icon {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; flex-shrink: 0; margin-top: 1px;
}
.icon-done     { background: rgba(34,197,94,0.13);  color: var(--done-c); }
.icon-progress { background: rgba(59,130,246,0.13); color: var(--prog-c); }
.icon-todo     { background: var(--dim); color: var(--muted); }

.task-body { flex: 1; min-width: 0; }

.task-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600;
  color: #fff; line-height: 1.3; margin-bottom: 3px;
}

.task-desc {
  font-size: 11.5px; color: var(--muted);
  line-height: 1.55;
}

.task-badge {
  flex-shrink: 0; align-self: flex-start; margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px; border: 1px solid;
  white-space: nowrap;
}
.badge-done     { color: var(--done-c); border-color: rgba(34,197,94,0.25);  background: rgba(34,197,94,0.08); }
.badge-progress { color: var(--prog-c); border-color: rgba(59,130,246,0.25); background: rgba(59,130,246,0.08); }
.badge-todo     { color: var(--muted);  border-color: var(--border); }

/* ── MILESTONE ── */
.milestone {
  padding: 12px 14px;
  background: var(--amber-bg);
  border: 1px solid var(--amber-border);
  border-radius: 8px;
  display: flex; align-items: flex-start; gap: 11px;
}

.ms-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; line-height: 1; }

.ms-body { flex: 1; }

.ms-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--amber); margin-bottom: 3px;
}

.ms-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--amber); margin-bottom: 3px; line-height: 1.3;
}

.ms-desc { font-size: 11.5px; color: rgba(245,158,11,0.55); line-height: 1.55; }

.ms-badge {
  flex-shrink: 0; align-self: flex-start; margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 0.8px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px; border: 1px solid;
  white-space: nowrap;
}
.ms-todo     { color: var(--amber); border-color: var(--amber-border); }
.ms-progress { color: var(--prog-c); border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); }
.ms-done     { color: var(--done-c); border-color: rgba(34,197,94,0.3);  background: rgba(34,197,94,0.08); }

/* ── PHASE COLORS ── */
.ph1 { border-color: var(--p1); color: var(--p1); }
.ph1n { color: var(--p1); }
.ph2 { border-color: var(--p2); color: var(--p2); }
.ph2n { color: var(--p2); }
.ph3 { border-color: var(--p3); color: var(--p3); }
.ph3n { color: var(--p3); }
.ph4 { border-color: var(--p4); color: var(--p4); }
.ph4n { color: var(--p4); }
.ph5 { border-color: var(--p5); color: var(--p5); }
.ph5n { color: var(--p5); }
.ph6 { border-color: var(--p6); color: var(--p6); }
.ph6n { color: var(--p6); }
.ph7 { border-color: var(--p7); color: var(--p7); }
.ph7n { color: var(--p7); }

@media (max-width: 600px) {
  header { padding: 20px; }
  .timeline { padding: 36px 20px 60px 64px; }
  .header-right { align-items: flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="wordmark"><div class="wdot"></div>WorldLider</div>
    <div class="tagline">Base Blockchain · ERC-20 WLT · Voting Platform</div>
  </div>
  <div class="header-right">
    <div class="progress-block">
      <div class="progress-row">
        <span class="prog-label">Progreso general</span>
        <span class="prog-pct" id="pct">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar" style="width:0%"></div></div>
      <div class="stats-row">
        <div class="stat"><div class="sdot" style="background:var(--done-c)"></div><span id="c-done">0</span> completadas</div>
        <div class="stat"><div class="sdot" style="background:var(--prog-c)"></div><span id="c-prog">0</span> en curso</div>
        <div class="stat"><div class="sdot" style="background:var(--todo-c)"></div><span id="c-todo">0</span> pendientes</div>
      </div>
    </div>
    <div class="updated" id="updated">—</div>
  </div>
</header>

<div class="timeline" id="timeline"></div>

<script>
// ─────────────────────────────────────────────────────────
//  EDITAR AQUÍ PARA ACTUALIZAR EL ROADMAP
//  type: 'task' | 'milestone'
//  s:    'todo' | 'progress' | 'done'
// ─────────────────────────────────────────────────────────

const PHASES = [
  {
    num: 'F1', cls: 'ph1', nameCls: 'ph1n',
    name: 'Setup',
    sub:  'Análisis y configuración del entorno — sin contacto con Pablo',
    items: [
      { type:'task', s:'done',     title:'Exportar código de Horizons',      desc:'Código fuente descargado y disponible en entorno local.' },
      { type:'task', s:'done',     title:'Análisis del código exportado',    desc:'Stack confirmado: React 18 + Vite, PocketBase, shadcn/ui, Tailwind, Framer Motion. MetaMask ya integrado.' },
      { type:'task', s:'progress', title:'Configurar repositorio local',     desc:'Estructura del proyecto en máquina del desarrollador. Roadmap publicado en GitHub Pages.' },
      { type:'task', s:'todo',     title:'Entorno de desarrollo blockchain', desc:'Instalar Hardhat. Configurar RPC de Base Sepolia. Variables de entorno.' },
    ]
  },
  {
    num: 'F2', cls: 'ph2', nameCls: 'ph2n',
    name: 'Smart Contracts',
    sub:  'Token ERC-20 y contrato de votación — wallet del desarrollador en testnet',
    items: [
      { type:'task', s:'todo', title:'Token WLT (ERC-20)',       desc:'OpenZeppelin ERC-20. Supply fijo: 144,000,000,000 WLT. En testnet se mintea a la wallet del desarrollador.' },
      { type:'task', s:'todo', title:'Contrato de votación',     desc:'Balance mínimo 1,000 WLT para votar. Un voto por wallet por elección. Eventos Vote() para indexar en el backend.' },
      { type:'task', s:'todo', title:'Tests unitarios',          desc:'Cobertura completa: mint, transferencia, votación válida, balance insuficiente, voto duplicado.' },
      { type:'task', s:'todo', title:'Deploy en Base Sepolia',   desc:'Deploy de WLTToken.sol y Voting.sol en testnet con wallet del desarrollador. Documentar contract addresses.' },
    ]
  },
  {
    num: 'F3', cls: 'ph3', nameCls: 'ph3n',
    name: 'Backend',
    sub:  'API REST e indexador de eventos — sin contacto con Pablo',
    items: [
      { type:'task', s:'todo', title:'Setup servidor Node.js',          desc:'Express/Fastify en /backend. Estructura: indexer/, api/, db/.' },
      { type:'task', s:'todo', title:'Base de datos y modelos',         desc:'SQLite para MVP (PostgreSQL en producción). Modelos: candidates, votes.' },
      { type:'task', s:'todo', title:'Indexador de eventos blockchain', desc:'Listener de eventos Vote() del contrato. Re-sincronización al iniciar. Guardado en DB.' },
      { type:'task', s:'todo', title:'API REST',                       desc:'GET /candidates · GET /results · GET /wallet/:address/status. CORS configurado.' },
    ]
  },
  {
    num: 'F4', cls: 'ph4', nameCls: 'ph4n',
    name: 'Frontend',
    sub:  'Migración y funcionalidades Web3 — sin contacto con Pablo',
    items: [
      { type:'task', s:'progress', title:'Migrar frontend de Horizons', desc:'Limpiar plugins de Horizons de vite.config.js. Adaptar PocketBase URL para local.' },
      { type:'task', s:'todo', title:'Integrar wagmi + viem',           desc:'Reemplazar WalletContext actual por wagmi. Soporte para Base Mainnet y Base Sepolia. Detección de red incorrecta.' },
      { type:'task', s:'todo', title:'Pantalla de votación',            desc:'Lista de candidatos con foto y descripción. Verificación de balance mínimo. Transacción de voto.' },
      { type:'task', s:'todo', title:'Dashboard de resultados',         desc:'Popular Vote + WLT Support Score por candidato. Consumo de API REST. Actualización periódica.' },
      { type:'task', s:'todo', title:'Responsive y polish',             desc:'Testing mobile-first. Ajustes de animaciones Framer Motion. Revisión visual completa.' },
    ]
  },
  {
    num: 'F5', cls: 'ph5', nameCls: 'ph5n',
    name: 'Integración y Testing',
    sub:  'Flujo completo en Base Sepolia — sin contacto con Pablo',
    items: [
      { type:'task', s:'todo', title:'Integración end-to-end en testnet', desc:'Conectar frontend → backend → contratos en Base Sepolia. Flujo completo de votación.' },
      { type:'task', s:'todo', title:'Testing completo',                  desc:'Casos borde: wallet sin fondos, voto doble, red incorrecta, candidato inválido.' },
      { type:'task', s:'todo', title:'Fix de bugs',                      desc:'Resolución de issues del testing. Revisión de seguridad básica de contratos y API.' },
    ]
  },
  {
    num: 'F6', cls: 'ph6', nameCls: 'ph6n',
    name: 'Traspaso a Pablo',
    sub:  'Primera coordinación con Pablo — cuentas e infraestructura',
    items: [
      { type:'milestone', s:'todo', title:'Demo a Pablo en testnet',
        desc:'Mostrar el flujo completo funcionando en Base Sepolia. Punto de validación y aprobación antes de ir a producción.' },
      { type:'milestone', s:'todo', title:'Conseguir un email de Pablo',
        desc:'Puede ser uno nuevo creado para el proyecto (ej: pablo@worldlider.com) o uno personal suyo. Solo se necesita acceso al email por ~15 minutos para confirmar los registros.' },
      { type:'task',      s:'todo', title:'Abrir cuenta GitHub con email de Pablo',
        desc:'El desarrollador crea la cuenta y el repositorio privado en nombre de Pablo. Pablo es el owner, el desarrollador queda como colaborador.' },
      { type:'task',      s:'todo', title:'Migrar repo al GitHub de Pablo',
        desc:'Push del historial completo al repositorio de Pablo. Verificar accesos y permisos.' },
      { type:'task',      s:'todo', title:'Abrir cuenta Railway con email de Pablo',
        desc:'El desarrollador crea la cuenta en nombre de Pablo. Requiere tarjeta de crédito de Pablo (~$5/mes, plan Hobby). Pablo es el owner.' },
      { type:'task',      s:'todo', title:'Abrir cuenta Vercel con email de Pablo',
        desc:'El desarrollador crea la cuenta en nombre de Pablo y la conecta a su GitHub. Pablo es el owner.' },
      { type:'task',      s:'todo', title:'Configurar variables de entorno',
        desc:'Variables de producción en Railway y Vercel apuntando a los contratos de mainnet.' },
    ]
  },
  {
    num: 'F7', cls: 'ph7', nameCls: 'ph7n',
    name: 'Producción',
    sub:  'Segunda coordinación con Pablo — wallet, ETH y DNS',
    items: [
      { type:'milestone', s:'todo', title:'Pablo comparte su dirección de wallet',
        desc:'Dirección pública de la wallet que recibirá el mint inicial de 144,000,000,000 WLT. Solo se necesita la dirección pública — nunca la clave privada.' },
      { type:'milestone', s:'todo', title:'Pablo carga ETH en su wallet',
        desc:'Necesario para pagar el gas del deploy en mainnet. Estimado: $5–20 USD en ETH sobre Base Mainnet. El desarrollador indica el monto exacto antes de este paso.' },
      { type:'task',      s:'todo', title:'Deploy contratos en Base Mainnet',
        desc:'Deploy definitivo de WLTToken y Voting. Mint de 144,000,000,000 WLT a la wallet de Pablo.' },
      { type:'task',      s:'todo', title:'Deploy backend en Railway',
        desc:'Producción en Railway de Pablo. Base de datos PostgreSQL. Indexador apuntando a mainnet.' },
      { type:'task',      s:'todo', title:'Deploy frontend en Vercel',
        desc:'Build de producción. Variables apuntando a contratos en mainnet y backend en Railway.' },
      { type:'milestone', s:'todo', title:'Migrar DNS worldlider.com a Vercel',
        desc:'El desarrollador hace el cambio en el panel de Hostinger de Pablo. Solo necesita acceso al panel por unos minutos. SSL automático vía Vercel.' },
      { type:'task',      s:'todo', title:'Testing final en producción',
        desc:'Smoke test completo en mainnet. Verificar dashboard, votación y wallet. Cierre del proyecto.' },
    ]
  },
];

// ─────────────────────────────────────────────────────────

function render() {
  const tl = document.getElementById('timeline');
  let all = 0, done = 0, prog = 0, todo = 0;

  PHASES.forEach(phase => {
    const ph = document.createElement('div');
    ph.className = 'phase';

    phase.items.filter(i => i.type === 'task').forEach(t => {
      all++;
      if (t.s === 'done')     done++;
      if (t.s === 'progress') prog++;
      if (t.s === 'todo')     todo++;
    });

    let html = `
      <div class="phase-dot ${phase.cls}">${phase.num}</div>
      <div class="phase-header">
        <div class="phase-name ${phase.nameCls}">${phase.name}</div>
        <div class="phase-sub">${phase.sub}</div>
      </div>
      <div class="tasks">
    `;

    phase.items.forEach(item => {
      if (item.type === 'milestone') {
        const bc = item.s === 'done' ? 'ms-done' : item.s === 'progress' ? 'ms-progress' : 'ms-todo';
        const bl = item.s === 'done' ? 'listo' : item.s === 'progress' ? 'en curso' : 'pendiente';
        html += `
          <div class="milestone">
            <div class="ms-icon">⚑</div>
            <div class="ms-body">
              <div class="ms-label">Requiere acción de Pablo</div>
              <div class="ms-title">${item.title}</div>
              <div class="ms-desc">${item.desc}</div>
            </div>
            <div class="ms-badge ${bc}">${bl}</div>
          </div>
        `;
      } else {
        const ic  = item.s === 'done' ? 'icon-done' : item.s === 'progress' ? 'icon-progress' : 'icon-todo';
        const sym = item.s === 'done' ? '✓' : item.s === 'progress' ? '●' : '○';
        const bc  = item.s === 'done' ? 'badge-done' : item.s === 'progress' ? 'badge-progress' : 'badge-todo';
        const bl  = item.s === 'done' ? 'completado' : item.s === 'progress' ? 'en curso' : 'pendiente';
        html += `
          <div class="task ${item.s === 'done' ? 'is-done' : ''}">
            <div class="task-icon ${ic}">${sym}</div>
            <div class="task-body">
              <div class="task-title">${item.title}</div>
              <div class="task-desc">${item.desc}</div>
            </div>
            <span class="task-badge ${bc}">${bl}</span>
          </div>
        `;
      }
    });

    html += '</div>';
    ph.innerHTML = html;
    tl.appendChild(ph);
  });

  const pct = all ? Math.round(done / all * 100) : 0;
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('c-done').textContent = done;
  document.getElementById('c-prog').textContent = prog;
  document.getElementById('c-todo').textContent = todo;

  const d = new Date(document.lastModified);
  document.getElementById('updated').textContent =
    'Actualizado ' + d.toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' });
}

render();
</script>
</body>
</html>
